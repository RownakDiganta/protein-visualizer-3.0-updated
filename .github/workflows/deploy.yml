name: Deploy React App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build
        env:
          CI: false
          # react-scripts 3.4.4 (webpack 4) crashes on Node 17+ with
          # "error:0308010C:digital envelope routines::unsupported" because of
          # OpenSSL 3.0's removal of legacy MD4 hashing. Same fix used locally.
          NODE_OPTIONS: --openssl-legacy-provider

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
